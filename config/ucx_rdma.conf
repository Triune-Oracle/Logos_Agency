# =============================================================================
# UCX RDMA Transport Configuration
# Logos Agency — Distributed Gradient Synchronization
# Compatible with UCX 1.14+ on InfiniBand EDR / RoCE v2 fabrics
# =============================================================================

# ---------------------------------------------------------------------------
# Transport selection
# Priority order: RDMA (RC/DC) > shared-memory > TCP fallback
# ---------------------------------------------------------------------------
UCX_TLS=rc,dc,ud,sm,tcp
UCX_NET_DEVICES=mlx5_0:1          # Primary InfiniBand / RoCE interface
UCX_IB_GID_INDEX=3                # RoCEv2 uses GID index 3

# ---------------------------------------------------------------------------
# InfiniBand / RoCE tuning
# ---------------------------------------------------------------------------
UCX_IB_NUM_PATHS=1                # Single path; increase to 2+ for multi-rail
UCX_IB_SEG_SIZE=2048k             # Segment size for rendezvous messages
UCX_IB_REG_METHODS=odp,rcache,direct  # Memory registration: on-demand paging preferred
UCX_IB_RCACHE_MAX_REGIONS=32768   # Maximum cached MR regions
UCX_IB_RCACHE_MEM_PRIO=1000       # Higher priority keeps GPU MRs hot

# Reliable Connected (RC) transport — optimised for large gradient blobs
UCX_RC_TIMEOUT=5s
UCX_RC_RETRY_COUNT=7
UCX_RC_MAX_GET_ZCOPY=1m           # Max zero-copy GET size (1 MB)
UCX_RC_MAX_PUT_ZCOPY=1m           # Max zero-copy PUT size (1 MB)
UCX_RC_FC_ENABLE=y                # Flow control enabled
UCX_RC_FC_WND_SIZE=512            # Flow-control window (# of messages)

# Dynamic Connected (DC) transport — low-connection-count at scale
UCX_DC_NUM_DCI=16                 # DCI (initiator) queue pairs per endpoint
UCX_DC_TX_QUEUE_LEN=256           # Send queue depth

# ---------------------------------------------------------------------------
# Memory and rendezvous thresholds
# ---------------------------------------------------------------------------
# Messages ≥ ZCOPY_THRESH bypass bounce buffers (zero-copy)
UCX_ZCOPY_THRESH=8192             # 8 KB — covers most gradient tensors

# Rendezvous protocol: used for large transfers (gradient all-reduce chunks)
UCX_RNDV_THRESH=65536             # 64 KB
UCX_RNDV_SCHEME=get_zcopy         # Pull-based zero-copy rendezvous

# ---------------------------------------------------------------------------
# GPU-Direct RDMA (requires CUDA + nvidia-peermem kernel module)
# ---------------------------------------------------------------------------
UCX_CUDA_COPY_MAX_REG_RATIO=0.5   # Use up to 50 % of GPU memory for MRs
UCX_IB_GPU_DIRECT_RDMA=yes        # Enable GPUDirect RDMA
UCX_MEMTYPE_CACHE=n               # Disable memtype cache (avoids stale GPU ptrs)

# ---------------------------------------------------------------------------
# Shared-memory transport (intra-node fast path)
# ---------------------------------------------------------------------------
UCX_SHM_MAX_SHM_SIZE=2g          # Shared-memory arena per process pair

# ---------------------------------------------------------------------------
# Logging and diagnostics (set UCX_LOG_LEVEL=debug for verbose traces)
# ---------------------------------------------------------------------------
UCX_LOG_LEVEL=warn
UCX_STATS_DEST=                   # Leave empty to disable stats export
# UCX_STATS_DEST=udp://127.0.0.1:9090   # Uncomment to export stats to Prometheus

# ---------------------------------------------------------------------------
# Fallback: pure TCP when RDMA hardware is absent
# Set UCX_TLS=tcp to force TCP-only mode for local development / CI
# ---------------------------------------------------------------------------
# UCX_TLS=tcp
# UCX_TCP_SNDBUF=4m
# UCX_TCP_RCVBUF=4m
