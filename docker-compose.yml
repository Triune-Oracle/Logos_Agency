version: "3.9"

services:
  # ── Go engine / API ───────────────────────────────────────────────────────────
  logos_agency:
    image: triumvirate/logos_agency:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ENV=development
      - LOG_LEVEL=info
      - ORCHESTRATOR_URL=http://orchestrator:5000
    depends_on:
      orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3

  # ── Python orchestrator ───────────────────────────────────────────────────────
  orchestrator:
    build:
      context: ./services/orchestrator
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - ORCHESTRATOR_PORT=5000
      - ORCHESTRATOR_CONFIG=/app/config.json
      - TRIUMV_LOG_DIR=/app/logs
    volumes:
      - orchestrator_logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3

volumes:
  orchestrator_logs:
