name: logostalisman
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.9
  - cudatoolkit=11.8
  - pytorch=2.6.0
  - torchvision=0.21.0
  - numpy=1.23.0
  - scipy=1.9.0
  - scikit-learn=1.1.1
  - pandas=1.4.3
  - matplotlib=3.5.2
  - seaborn=0.11.2
  - pip:
    - tensorboard==2.9.1
    # horovod is NOT listed here: all released versions (<=0.28.1) contain an
    # unpatched command-injection vulnerability (no fix available upstream).
    # Install only if needed for distributed training (Protocols B & C) and
    # only after confirming a patched release at https://github.com/horovod/horovod.
    - pytorch-fid==0.2.1
    - scikit-image==0.19.3
    - pytest==7.1.2
    - huggingface_hub==0.11.1
