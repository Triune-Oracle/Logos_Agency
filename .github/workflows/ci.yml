name: CI Build and Test

on:
  push:
    branches: [ "main", "develop", "claude/*" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # ── Go: vet, build, test, benchmark ─────────────────────────────────────────
  # Only runs when Go source, module files, or Makefile change.
  go:
    name: Go
    runs-on: ubuntu-latest
    # Skip this job if only frontend/package files changed
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       contains(toJson(github.event.pull_request.changed_files), '.go') ||
       contains(toJson(github.event.pull_request.changed_files), 'go.mod') ||
       contains(toJson(github.event.pull_request.changed_files), 'go.sum'))
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./engine/ ./tests/ .

      - name: Build engine
        run: go build ./engine/

      - name: Test (package main)
        run: go test . -v -timeout 120s

      - name: Test (tests package)
        run: go test ./tests/ -v -timeout 120s

      - name: Benchmarks (package main)
        # Benchmarks run only on push to main/develop, not on every PR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        run: go test . -bench=. -benchtime=2s -run='^$' -timeout 120s

  # ── Node / TurboRepo: build + test all JS/TS workspaces ─────────────────────
  # Only runs when frontend/package files or config change.
  node:
    name: Node / Turbo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (turbo)
        run: npx turbo run lint
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Build (turbo)
        run: npx turbo run build
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Test (turbo)
        run: npx turbo run test
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  # ── Python orchestrator ──────────────────────────────────────────────────────
  # Only runs when orchestrator source or tests change.
  python:
    name: Python / Orchestrator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/orchestrator
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/orchestrator/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing
