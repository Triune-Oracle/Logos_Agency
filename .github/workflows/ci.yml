name: CI Build and Test

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
    - name: Build engine
      run: go build ./engine/
    - name: Run tests
      run: go test ./tests/ -v
    - name: Run benchmarks
      run: go test ./tests/ -bench=. -benchtime=2s -run='^$'
    - name: Vet
      run: go vet ./engine/ ./tests/

