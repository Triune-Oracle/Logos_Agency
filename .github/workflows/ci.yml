name: CI Build and Test

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Download dependencies
      run: go mod download

    - name: Vet
      run: go vet ./engine/ ./tests/ .

    - name: Build engine
      run: go build ./engine/

    - name: Test (package main)
      run: go test . -v -timeout 120s

    - name: Test (tests package)
      run: go test ./tests/ -v -timeout 120s

    - name: Benchmarks (package main)
      run: go test . -bench=. -benchtime=2s -run='^$' -timeout 120s
